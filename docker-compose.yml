# Standalone Docker Compose for Nexo (no Warden dependency)
#
# Usage:
#   docker compose up -d
#   nexo init
#   npm run seed:example
#
# Services:
#   SurrealDB  → http://localhost:8000
#   API        → http://localhost:3001
#   Console    → http://localhost:8080

services:
  surrealdb:
    image: surrealdb/surrealdb:v3
    user: "0:0"
    command: start --log info --user root --pass root surrealkv:/data
    ports:
      - "8000:8000"
    volumes:
      - surrealdata:/data
    healthcheck:
      test: ["CMD", "/surreal", "isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: node:22-slim
    working_dir: /app
    command: node dist/cli/index.js web --port 3000 --host 0.0.0.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./dist:/app/dist:ro
      - ./node_modules:/app/node_modules:ro
      - ./package.json:/app/package.json:ro
    environment:
      NEXO_DB_URL: http://surrealdb:8000
    depends_on:
      surrealdb:
        condition: service_healthy

  console:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./web-console/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  surrealdata:
